# BatuFlow — PostgreSQL 16 + Redis 7 for local development
# Usage: npm run docker:up  (or: docker compose up -d)

services:
  postgres:
    image: postgres:16-alpine
    container_name: batuflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: batuflow
      POSTGRES_PASSWORD: batuflow
      POSTGRES_DB: batuflow
    ports:
      - "5432:5432"
    volumes:
      - batuflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batuflow -d batuflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: batuflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - batuflow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  batuflow_pgdata:
  batuflow_redisdata:
